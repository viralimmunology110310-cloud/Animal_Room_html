<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rack OS v8.0</title>
    <style>
        /* --- 1. Premium Dark Tech UI Theme --- */
        :root {
            --breeding-bg: linear-gradient(135deg, #ffffff 0%, #e5e5ea 100%);
            --mating-bg: linear-gradient(135deg, #ffe600 0%, #ff9500 100%);
            --glass-panel: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --slot-bg: rgba(255, 255, 255, 0.02);
            --slot-border: rgba(255, 255, 255, 0.12);
            --text-main: #f5f5f7;
            --text-sub: #8e8e93;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #0d0f14;
            background-image: radial-gradient(circle at 50% 30%, #1a1e29 0%, #0a0c10 80%);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        header {
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); background: rgba(10, 12, 16, 0.8); backdrop-filter: blur(40px);
            box-sizing: border-box; height: 65px;
        }
        header h1 { margin: 0; font-size: 22px; font-weight: 700; background: linear-gradient(90deg, #fff, #8e8e93); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .top-right { display: flex; align-items: center; gap: 20px; }
        .progress-container { width: 150px; background: rgba(255,255,255,0.08); height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #0a84ff, #00cbff); width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 13px; color: var(--text-sub); font-weight: 600; }
        
        .header-btn { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .header-btn:hover { background: rgba(255,255,255,0.15); }

        /* --- 2. 대시보드 레이아웃 --- */
        .workspace { flex: 1; display: flex; overflow: hidden; position: relative; height: calc(100vh - 65px); }

        /* 왼쪽 사이드바 */
        .left-sidebar {
            width: 350px; border-right: 1px solid var(--glass-border); padding: 20px;
            display: flex; flex-direction: column; gap: 20px; background: rgba(0,0,0,0.4); overflow-y: auto; box-sizing: border-box;
        }
        .section-title { font-size: 12px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 5px; }
        
        .config-box { background: rgba(255,255,255,0.01); border: 1px solid var(--glass-border); border-radius: 16px; padding: 12px; }
        .config-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
        .config-row:last-child { margin-bottom: 0; }
        .config-input { width: 55px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 5px; border-radius: 8px; text-align: center; font-weight: bold; }

        /* 🗺️ 배치 도면 내비게이터 구역 */
        .room-map {
            position: relative; width: 100%; height: 290px; background: rgba(0,0,0,0.2);
            border: 1px solid var(--glass-border); border-radius: 24px; box-sizing: border-box; flex-shrink: 0;
        }
        
        .map-rack {
            position: absolute; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.25s ease;
            box-sizing: border-box; overflow: hidden; padding: 4px; color: var(--text-main);
        }
        .map-rack:hover, .map-rack.active { background: rgba(10, 132, 255, 0.12); border-color: #0a84ff; box-shadow: 0 0 12px rgba(10,132,255,0.3); }
        .map-rack.drag-over { background: rgba(52, 199, 89, 0.2) !important; border-color: #34c759 !important; transform: scale(1.03); }

        .mini-indicator-grid {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; width: 100%; margin-top: 5px; pointer-events: none;
        }
        .mini-dot { height: 4px; background: rgba(255,255,255,0.08); border-radius: 1px; }
        .mini-dot.filled { background: #0a84ff; }
        .map-rack:hover .mini-dot.filled { background: #ffe600; }

        /* 도면 배치도 고정 규격 */
        .rack-A { top: 15px; left: 15px; width: 55px; height: 110px; }
        .rack-C { top: 140px; left: 15px; width: 55px; height: 130px; }
        .rack-B { top: 15px; right: 15px; width: 55px; height: 110px; }
        .rack-D { bottom: 65px; left: 90px; width: 215px; height: 36px; }
        .rack-D .mini-indicator-grid { margin-top: 3px; }
        .rack-E { bottom: 15px; left: 90px; width: 215px; height: 36px; }
        .rack-E .mini-indicator-grid { margin-top: 3px; }
        
        .change-station {
            position: absolute; top: 140px; right: 15px; width: 100px; height: 85px;
            border: 1px dashed rgba(255,255,255,0.12); background: rgba(255,255,255,0.01);
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: var(--text-sub); text-align: center; line-height: 1.4; font-weight: 600;
        }

        /* 오른쪽 메인 제어판 */
        .board-pane { flex: 1; padding: 30px; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; overflow: auto; box-sizing: border-box; position: relative; }
        .board-header { margin-bottom: 20px; }
        .board-title { font-size: 26px; font-weight: 700; margin: 0; }
        .board-desc { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        .grid-container {
            background: var(--glass-panel); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); position: relative; width: fit-content;
        }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 92px); gap: 14px; position: relative; }

        /* --- 3. 정밀 슬롯 및 프리미엄 그라데이션 광택 케이지 --- */
        .slot {
            width: 92px; height: 92px; border-radius: 24px; background: var(--slot-bg);
            border: 1px dashed var(--slot-border); position: relative;
            display: flex; align-items: center; justify-content: center; box-sizing: border-box;
        }
        .slot::before { content: attr(data-label); font-size: 11px; color: rgba(255,255,255,0.1); font-weight: 600; }
        .slot.ghost-slot { border-color: rgba(255, 55, 95, 0.35); background: rgba(255, 55, 95, 0.02); }

        .cage {
            width: 92px; height: 92px; border-radius: 24px; position: absolute;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.4); box-sizing: border-box;
            cursor: grab; touch-action: none; z-index: 10;
        }
        .cage::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 24px; background: linear-gradient(to bottom, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 50%);
            pointer-events: none;
        }
        .cage.breeding { background: var(--breeding-bg); color: #1c1c1e; border: 1px solid rgba(255,255,255,0.8); }
        .cage.mating { background: var(--mating-bg); color: #1c1c1e; border: 1px solid rgba(255,225,0,0.7); }
        
        /* ⭐️ [커서 완전 고정 알고리즘] 드래그 연산 시 변형 스케일 마진 배제 */
        .cage.floating {
            cursor: grabbing; z-index: 9999 !important;
            box-shadow: 0 35px 60px rgba(0,0,0,0.7);
            pointer-events: none;
            position: fixed !important;
            margin: 0 !important; padding: 0 !important;
        }

        .strain-code { font-size: 30px; font-weight: 800; line-height: 1; letter-spacing: -0.5px; }
        .sub-id { font-size: 12px; font-weight: 700; margin-top: 5px; background: rgba(0,0,0,0.06); padding: 1px 6px; border-radius: 6px; }

        /* --- 4. 오버레이 우측 판넬 (Strain 매칭표) --- */
        .side-panel {
            position: fixed; top: 0; right: -360px; width: 340px; height: 100vh;
            background: rgba(20, 22, 28, 0.9); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-left: 1px solid var(--glass-border); z-index: 1500; padding: 40px 25px; box-shadow: -20px 0 50px rgba(0,0,0,0.6);
            transition: right 0.35s cubic-bezier(0.16, 1, 0.3, 1); box-sizing: border-box;
        }
        .side-panel.open { right: 0; }
        .side-panel h2 { font-size: 22px; margin-top: 0; margin-bottom: 25px; font-weight: 700; }
        
        .match-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .match-key-input { width: 45px; font-weight: 800; font-size: 16px; color: #ffcc00; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.15); text-align: center; padding: 6px; border-radius: 8px; color: white; }
        .match-val { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 8px; border-radius: 8px; font-size: 14px; }

        /* --- 5. 정보 수정 모달 창 --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); z-index: 2500;
            display: none; justify-content: center; align-items: center;
        }
        .modal {
            background: rgba(25, 27, 34, 0.96); border: 1px solid var(--glass-border); border-radius: 28px;
            width: 440px; padding: 35px; box-shadow: 0 40px 90px rgba(0,0,0,0.7); box-sizing: border-box;
        }
        .modal h2 { margin-top: 0; margin-bottom: 20px; font-size: 22px; font-weight: 700; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 5px; font-weight: 600; }
        .form-control {
            width: 100%; padding: 11px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.4); color: white; font-size: 14px; box-sizing: border-box;
        }
        .form-row { display: flex; gap: 10px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; margin-top: 25px; }
        .btn { padding: 12px 18px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: rgba(255,255,255,0.08); color: white; }
        .btn-save { background: #0a84ff; color: white; }
        .btn-delete { background: #FF375F; color: white; margin-right: auto; }
    </style>
</head>
<body>

<header>
    <h1>Smart Rack OS <span style="font-size:14px; color:#ffcc00; font-weight:bold; margin-left:6px;">v8.0 Absolute Precision</span></h1>
    <div class="top-right">
        <div class="progress-text">총 공간 밀도: <span id="occupancy-label">0%</span></div>
        <div class="progress-container"><div class="progress-bar" id="occupancy-bar"></div></div>
        <button class="header-btn" onclick="openMatchPanel(event)">🧬 Strain 매칭표 편집</button>
    </div>
</header>

<div class="workspace">
    <div class="left-sidebar">
        <div class="section-title">랙 가로 행 세부 조절</div>
        <div class="config-box" id="config-box"></div>
        
        <div style="border-bottom: 1px solid var(--glass-border); margin: 5px 0;"></div>
        <div class="section-title">연구실 배치 도면 (드래그 전환 지원)</div>
        
        <div class="room-map" id="room-map">
            <div class="map-rack rack-A" data-rack="A" id="map-A">A<div class="mini-indicator-grid"></div></div>
            <div class="map-rack rack-B" data-rack="B" id="map-B">B<div class="mini-indicator-grid"></div></div>
            <div class="map-rack rack-C" data-rack="C" id="map-C">C<div class="mini-indicator-grid"></div></div>
            <div class="map-rack rack-D" data-rack="D" id="map-D">D<div class="mini-indicator-grid"></div></div>
            <div class="map-rack rack-E" data-rack="E" id="map-E">E<div class="mini-indicator-grid"></div></div>
            <div class="change-station">Change<br>Station</div>
        </div>
    </div>

    <div class="board-pane">
        <div class="board-header">
            <h2 class="board-title" id="current-rack-title">Rack A</h2>
            <div class="board-desc" id="current-rack-desc">계산 중...</div>
        </div>
        
        <div class="grid-container">
            <div class="grid-7" id="main-grid"></div>
        </div>
    </div>
</div>

<div class="side-panel" id="match-panel">
    <h2>🧬 Strain 기호 편집기</h2>
    <p style="font-size:12px; color:var(--text-sub); margin-bottom:20px;">기호 알파벳과 실제 Strain 명칭을 자유롭게 수정해 보세요.</p>
    <div id="mapping-list"></div>
    <button class="header-btn" style="width:100%; margin-top:20px; background:#0a84ff; color:white; border:none;" onclick="addNewMappingRow()">+ 새 Strain 기호 추가</button>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">케이지 속성 세부 편집</h2>
        <input type="hidden" id="m-id">
        
        <div class="form-group">
            <label>용도 구분</label>
            <select id="m-type" class="form-control" onchange="toggleModalFields()">
                <option value="breeding">Breeding (생산용 - 흰색 광택)</option>
                <option value="mating">Mating (교배용 - 노란색 광택)</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:1;">
                <label>표시 알파벳 기호</label>
                <input type="text" id="m-code" class="form-control">
            </div>
            <div class="form-group" style="flex:1;">
                <label id="sub-label">서브 번호</label>
                <input type="text" id="m-sub" class="form-control">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group" style="flex:1;">
                <label>암컷 수 (♀)</label>
                <input type="number" id="m-female" class="form-control" min="0">
            </div>
            <div class="form-group" style="flex:1;">
                <label>수컷 수 (♂)</label>
                <input type="number" id="m-male" class="form-control" min="0">
            </div>
        </div>
        <div class="form-group" id="dob-group">
            <label>DOB (출생일)</label>
            <input type="date" id="m-dob" class="form-control">
        </div>
        <div class="form-group" id="dom-group">
            <label>DOM (교배일)</label>
            <input type="date" id="m-dom" class="form-control">
        </div>
        <div class="form-group">
            <label>특이사항 (Notes)</label>
            <textarea id="m-notes" class="form-control" rows="2"></textarea>
        </div>
        
        <div class="modal-btns">
            <button class="btn btn-delete" id="btn-delete" onclick="deleteCage()">삭제</button>
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-save" onclick="saveCage()">적용</button>
        </div>
    </div>
</div>

<script>
    let RACK_ROWS = { 'A': 5, 'B': 5, 'C': 5, 'D': 3, 'E': 3 };
    let currentRack = 'A';
    let STRAIN_MAP = { 'A': 'K18-hACE2', 'C': 'Aim2', 'W': 'Wild Type' };

    let cages = [
        { id: 'm1', rackId: 'A', cellIdx: 0, type: 'mating', code: 'A', subId: '53', female: 2, male: 1, dob: '', dom: '2026-05-10', notes: '' },
        { id: 'm2', rackId: 'A', cellIdx: 1, type: 'mating', code: 'A', subId: '54', female: 1, male: 1, dob: '', dom: '2026-05-12', notes: '' },
        { id: 'm3', rackId: 'A', cellIdx: 7, type: 'mating', code: 'A', subId: '55', female: 2, male: 1, dob: '', dom: '2026-05-14', notes: '' },
        { id: 'b1', rackId: 'A', cellIdx: 3, type: 'breeding', code: 'W', subId: '5마리', female: 5, male: 0, dob: '2026-04-01', dom: '', notes: '' },
        { id: 'b2', rackId: 'A', cellIdx: 4, type: 'breeding', code: 'C', subId: 'C10', female: 3, male: 2, dob: '2026-04-03', dom: '', notes: '' },
        { id: 'm4', rackId: 'B', cellIdx: 0, type: 'mating', code: 'A', subId: '51', female: 1, male: 1, dob: '', dom: '', notes: '' },
        { id: 'b3', rackId: 'C', cellIdx: 0, type: 'breeding', code: 'C', subId: 'C12', female: 4, male: 0, dob: '', dom: '', notes: '' }
    ];

    for(let i=5; i<=10; i++) cages.push({ id: `m_init_${i}`, rackId: 'B', cellIdx: i, type: 'mating', code: 'A', subId: `5${i}`, female: 2, male: 1, dob: '', dom: '', notes: '' });
    for(let i=4; i<=11; i++) cages.push({ id: `b_init_${i}`, rackId: 'C', cellIdx: i, type: 'breeding', code: 'C', subId: `3`, female: 3, male: 0, dob: '', dom: '', notes: '' });

    let dragData = { id: null, active: false, el: null, startX: 0, startY: 0, clickOffsetX: 0, clickOffsetY: 0, hasMoved: false };

    // --- 1. [마우스 이격 원천 차단] 1:1 절대 동적 오프셋 고정 엔진 ---
    function setupDragEngine(cageEl, cageId) {
        cageEl.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return;
            e.preventDefault();
            
            dragData.id = cageId;
            dragData.active = true;
            dragData.el = cageEl;
            dragData.startX = e.clientX;
            dragData.startY = e.clientY;
            dragData.hasMoved = false;

            // ⭐️ [오차 파괴 핵심] 클릭한 그 순간, 뷰포트 내 엘리먼트의 정확한 사각 좌표를 따서 마우스 포인터와의 실제 거리 계산
            const rect = cageEl.getBoundingClientRect();
            dragData.clickOffsetX = e.clientX - rect.left;
            dragData.clickOffsetY = e.clientY - rect.top;

            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        });
    }

    function onPointerMove(e) {
        if (!dragData.active) return;
        
        if (!dragData.hasMoved && Math.hypot(e.clientX - dragData.startX, e.clientY - dragData.startY) > 4) {
            dragData.hasMoved = true;
            dragData.el.classList.add('floating');
        }

        if (dragData.hasMoved) {
            // ⭐️ 잡은 위치 오프셋을 그대로 유지하여 마우스 포인터 정위치에 고정 (우하단 엇나감 해결)
            dragData.el.style.left = (e.clientX - dragData.clickOffsetX) + 'px';
            dragData.el.style.top = (e.clientY - dragData.clickOffsetY) + 'px';

            document.querySelectorAll('.map-rack').forEach(rackEl => {
                const r = rackEl.getBoundingClientRect();
                if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
                    rackEl.classList.add('drag-over');
                    
                    if(currentRack !== rackEl.dataset.rack) {
                        currentRack = rackEl.dataset.rack;
                        renderMainBoard();
                        updateMapIndicator();
                    }
                } else {
                    rackEl.classList.remove('drag-over');
                }
            });
        }
    }

    function onPointerUp(e) {
        if (!dragData.active) return;
        dragData.active = false;
        document.removeEventListener('pointermove', onPointerMove);
        document.removeEventListener('pointerup', onPointerUp);

        // ⭐️ 움직임이 없었다면 정밀 클릭으로 인정하여 정상 팝업 작동
        if (!dragData.hasMoved) {
            openModal(dragData.id);
            return;
        }

        dragData.el.classList.remove('floating');
        let isMappedDrop = false;

        document.querySelectorAll('.map-rack').forEach(rackEl => {
            if (rackEl.classList.contains('drag-over')) {
                rackEl.classList.remove('drag-over');
                isMappedDrop = true;
                crossRackTargetMove(dragData.id, rackEl.dataset.rack);
            }
        });

        if (!isMappedDrop) {
            const slots = document.querySelectorAll('#main-grid .slot');
            let targetSlot = null;
            let minD = 9999;

            slots.forEach(slot => {
                const r = slot.getBoundingClientRect();
                const d = Math.hypot((r.left + r.width/2) - e.clientX, (r.top + r.height/2) - e.clientY);
                if (d < minD && d < 60) { minD = d; targetSlot = slot; }
            });

            if (targetSlot) {
                executeSmartShift(dragData.id, currentRack, parseInt(targetSlot.dataset.idx));
            } else {
                renderMainBoard();
            }
        }
    }

    // --- 2. 스마트 도미노 시프트 알고리즘 ---
    function executeSmartShift(cageId, targetRack, targetIdx) {
        const item = cages.find(c => c.id === cageId);
        if (item.rackId === targetRack && item.cellIdx === targetIdx) { renderMainBoard(); return; }

        const occupant = cages.find(c => c.rackId === targetRack && c.cellIdx === targetIdx && c.id !== cageId);
        if (occupant) {
            let capacity = RACK_ROWS[targetRack] * 7;
            let firstEmpty = -1;
            for (let i = targetIdx; i < capacity + 30; i++) {
                if (!cages.some(c => c.rackId === targetRack && c.cellIdx === i && c.id !== cageId)) {
                    firstEmpty = i; break;
                }
            }
            cages.forEach(c => {
                if (c.rackId === targetRack && c.id !== cageId && c.cellIdx >= targetIdx && c.cellIdx < firstEmpty) {
                    c.cellIdx += 1;
                }
            });
        }
        item.rackId = targetRack;
        item.cellIdx = targetIdx;
        renderMainBoard();
        updateMapIndicator();
    }

    function crossRackTargetMove(cageId, targetRack) {
        const item = cages.find(c => c.id === cageId);
        let targetIdx = 0;
        while (cages.some(c => c.rackId === targetRack && c.cellIdx === targetIdx)) { targetIdx++; }
        item.rackId = targetRack;
        item.cellIdx = targetIdx;
        currentRack = targetRack;
        renderMainBoard();
        updateMapIndicator();
    }

    // --- 3. 실시간 메인 대시보드 격자 드로잉 ---
    function renderMainBoard() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        document.getElementById('current-rack-title').innerText = `Rack ${currentRack}`;
        
        const baseCapacity = RACK_ROWS[currentRack] * 7;
        const currentCages = cages.filter(c => c.rackId === currentRack);
        const maxIdx = currentCages.reduce((max, c) => c.cellIdx > max ? c.cellIdx : max, baseCapacity - 1);
        const totalCapacity = maxIdx + 1;

        document.getElementById('current-rack-desc').innerText = `${RACK_ROWS[currentRack]}행 × 7열 (${baseCapacity}칸 총 정원)`;

        for (let i = 0; i < totalCapacity; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (i >= baseCapacity) slot.classList.add('ghost-slot');
            
            const rChar = String.fromCharCode(64 + Math.floor(i / 7) + 1);
            slot.setAttribute('data-label', `${rChar}-${(i % 7) + 1}`);
            slot.dataset.idx = i;
            slot.onclick = () => openModal(null, i);
            grid.appendChild(slot);
        }

        currentCages.forEach(cage => {
            const targetSlot = grid.children[cage.cellIdx];
            if (!targetSlot) return;

            const el = document.createElement('div');
            el.className = `cage ${cage.type}`;
            
            // ⭐️ [요구사항 반영] 텍스트 매핑 조건문 단순화 보강
            let displaySub = cage.subId;
            if (cage.type === 'mating') {
                // 노란색(Mating)은 무조건 A52처럼 알파벳 기호와 번호 조합만 표기 (암수 숨김)
                displaySub = cage.code + cage.subId;
                el.innerHTML = `<span class="strain-code" style="font-size:24px;">${displaySub}</span>`;
            } else {
                // 흰색(Breeding)은 기호와 서브텍스트(마리수/번호) 형태로 조합 표기
                displaySub = cage.subId;
                el.innerHTML = `<span class="strain-code">${cage.code}</span><span class="sub-id">${displaySub}</span>`;
            }
            
            setupDragEngine(el, cage.id);

            setTimeout(() => {
                el.style.left = targetSlot.offsetLeft + 'px';
                el.style.top = targetSlot.offsetTop + 'px';
            }, 0);

            grid.appendChild(el);
        });
        updateStatsBar();
    }

    // --- 4. 미니 도면 레이아웃 매핑 제어 ---
    function buildLeftSidebar() {
        const configBox = document.getElementById('config-box');
        configBox.innerHTML = '';
        for (const [rName, rows] of Object.entries(RACK_ROWS)) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'config-row';
            rowDiv.innerHTML = `
                <span>Rack ${rName} 세로 줄 수</span>
                <input type="number" class="config-input" value="${rows}" min="1" max="12" data-rack="${rName}">
            `;
            rowDiv.querySelector('input').onchange = (e) => {
                RACK_ROWS[e.target.dataset.rack] = parseInt(e.target.value);
                renderMainBoard();
                updateMapIndicator();
            };
            configBox.appendChild(rowDiv);
        }

        document.querySelectorAll('.map-rack').forEach(el => {
            el.onclick = () => {
                currentRack = el.dataset.rack;
                updateMapIndicator();
                renderMainBoard();
            };
        });
        updateMapIndicator();
    }

    function updateMapIndicator() {
        document.querySelectorAll('.map-rack').forEach(el => {
            if (el.dataset.rack === currentRack) el.classList.add('active');
            else el.classList.remove('active');
            
            const rName = el.dataset.rack;
            const totalSlots = RACK_ROWS[rName] * 7;
            const occupiedCount = cages.filter(c => c.rackId === rName).length;

            el.childNodes[0].textContent = `${rName} (${occupiedCount}/${totalSlots})`;

            const dotGrid = el.querySelector('.mini-indicator-grid');
            dotGrid.innerHTML = '';
            
            for(let i=0; i<7; i++) {
                const dot = document.createElement('div');
                dot.className = 'mini-dot';
                if(occupiedCount > (i * (totalSlots / 7))) {
                    dot.className = 'mini-dot filled';
                }
                dotGrid.appendChild(dot);
            }
        });
    }

    // --- 5. 세부 속성 모달 제어창 ---
    const modal = document.getElementById('modal');
    let targetSlotIdxForCreate = null;

    function openModal(cageId, slotIdx = null) {
        if (cageId) {
            const c = cages.find(x => x.id === cageId);
            document.getElementById('modal-title').innerText = "케이지 데이터 편집";
            document.getElementById('m-id').value = c.id;
            document.getElementById('m-type').value = c.type;
            document.getElementById('m-code').value = c.code;
            document.getElementById('m-sub').value = c.subId;
            document.getElementById('m-female').value = c.female !== undefined ? c.female : 0;
            document.getElementById('m-male').value = c.male !== undefined ? c.male : 0;
            document.getElementById('m-dob').value = c.dob || "";
            document.getElementById('m-dom').value = c.dom || "";
            document.getElementById('m-notes').value = c.notes || "";
            document.getElementById('btn-delete').style.display = 'block';
        } else {
            targetSlotIdxForCreate = slotIdx;
            document.getElementById('modal-title').innerText = `신규 등록 (Rack ${currentRack})`;
            document.getElementById('m-id').value = "";
            document.getElementById('m-type').value = "breeding";
            document.getElementById('m-code').value = "";
            document.getElementById('m-sub').value = "";
            document.getElementById('m-female').value = 0;
            document.getElementById('m-male').value = 0;
            document.getElementById('m-dob').value = "";
            document.getElementById('m-dom').value = "";
            document.getElementById('m-notes').value = "";
            document.getElementById('btn-delete').style.display = 'none';
        }
        toggleModalFields();
        modal.style.display = 'flex';
    }

    function toggleModalFields() {
        const type = document.getElementById('m-type').value;
        if (type === 'mating') {
            document.getElementById('dob-group').style.display = 'none';
            document.getElementById('dom-group').style.display = 'block';
            document.getElementById('sub-label').innerText = "Mating 일련세트 번호 (예: 52)";
        } else {
            document.getElementById('dob-group').style.display = 'block';
            document.getElementById('dom-group').style.display = 'none';
            document.getElementById('sub-label').innerText = "Genotype 번호 또는 마리수";
        }
    }

    function closeModal() { modal.style.display = 'none'; }

    function saveCage() {
        const id = document.getElementById('m-id').value;
        const info = {
            type: document.getElementById('m-type').value,
            code: document.getElementById('m-code').value.toUpperCase(),
            subId: document.getElementById('m-sub').value,
            female: parseInt(document.getElementById('m-female').value) || 0,
            male: parseInt(document.getElementById('m-male').value) || 0,
            dob: document.getElementById('m-dob').value,
            dom: document.getElementById('m-dom').value,
            notes: document.getElementById('m-notes').value
        };

        if (id) {
            Object.assign(cages.find(x => x.id === id), info);
        } else {
            cages.push({ id: 'c_' + Date.now(), rackId: currentRack, cellIdx: targetSlotIdxForCreate, ...info });
        }
        closeModal(); renderMainBoard(); updateMapIndicator();
    }

    function deleteCage() {
        cages = cages.filter(c => c.id !== document.getElementById('m-id').value);
        closeModal(); renderMainBoard(); updateMapIndicator();
    }

    // --- 6. Strain 테이블 외부 클릭 지원 모듈 ---
    const matchPanel = document.getElementById('match-panel');

    function openMatchPanel(e) {
        e.stopPropagation();
        const listContainer = document.getElementById('mapping-list');
        listContainer.innerHTML = '';
        
        for(const [key, val] of Object.entries(STRAIN_MAP)) {
            const row = document.createElement('div');
            row.className = 'match-row';
            row.innerHTML = `
                <input type="text" class="match-key-input" value="${key}" maxlength="2" data-oldkey="${key}">
                <input type="text" class="match-val" value="${val}" data-key="${key}">
            `;
            
            row.querySelector('.match-key-input').onchange = (evt) => {
                const oldKey = evt.target.dataset.oldkey;
                const newKey = evt.target.value.toUpperCase();
                if(newKey && newKey !== oldKey) {
                    STRAIN_MAP[newKey] = STRAIN_MAP[oldKey];
                    delete STRAIN_MAP[oldKey];
                    openMatchPanel(e);
                }
            };

            row.querySelector('.match-val').oninput = (evt) => {
                const targetKey = evt.target.dataset.key;
                STRAIN_MAP[targetKey] = evt.target.value;
            };

            listContainer.appendChild(row);
        }
        matchPanel.classList.add('open');
    }

    function addNewMappingRow() {
        let newKey = 'X';
        if (STRAIN_MAP[newKey]) newKey = String.fromCharCode(newKey.charCodeAt(0) + 1);
        STRAIN_MAP[newKey] = '새로운 Strain 명칭';
        const dummyEvent = { stopPropagation: function(){} };
        openMatchPanel(dummyEvent);
    }

    document.addEventListener('click', (e) => {
        if (matchPanel.classList.contains('open')) {
            if (!matchPanel.contains(e.target) && !e.target.classList.contains('header-btn')) {
                matchPanel.classList.remove('open');
                renderMainBoard();
            }
        }
    });

    function updateStatsBar() {
        const total = Object.values(RACK_ROWS).reduce((a,b)=>a+b, 0) * 7;
        const currentCount = cages.length;
        const rate = total > 0 ? Math.round((currentCount / total) * 100) : 0;
        document.getElementById('occupancy-label').innerText = `${rate}% (${currentCount}/${total} 칸)`;
        document.getElementById('occupancy-bar').style.width = `${rate}%`;
    }

    buildLeftSidebar();
    renderMainBoard();
</script>
