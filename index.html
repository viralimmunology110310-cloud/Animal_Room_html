<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rack OS - Glass Edition</title>
    <style>
        /* --- 1. 배경 및 전역 설정 (Premium Dark Glass) --- */
        :root {
            --breeding-color: linear-gradient(135deg, #0A84FF, #0055B3);
            --mating-color: linear-gradient(135deg, #FF375F, #B30027);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #a1a1a6;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at 15% 50%, #1a1a2e, #000000 50%, #0d1b2a 100%);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); }
        header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 1px; }
        .sync-btn { background: #0A84FF; color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .sync-btn:hover { background: #0066CC; transform: scale(1.05); }

        /* --- 2. 랙 레이아웃 (가로 스크롤) --- */
        .rack-container {
            flex: 1; display: flex; gap: 40px; padding: 40px; overflow-x: auto; overflow-y: hidden;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 30px; padding: 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2); display: flex; flex-direction: column;
            min-width: fit-content;
        }
        
        .rack-title { font-size: 22px; font-weight: 600; margin-bottom: 20px; color: var(--text-sub); }

        .grid-7 { display: grid; grid-template-columns: repeat(7, 85px); gap: 12px; }

        /* --- 3. 케이지 및 슬롯 --- */
        .slot {
            width: 85px; height: 85px; border-radius: 20px; background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.15); position: relative;
            display: flex; align-items: center; justify-content: center; transition: all 0.2s;
            cursor: pointer;
        }
        .slot:hover { background: rgba(255,255,255,0.05); }
        .slot.drag-over { transform: scale(1.05); border-color: #0A84FF; background: rgba(10, 132, 255, 0.1); }

        .cage {
            width: 100%; height: 100%; border-radius: 20px; position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); cursor: grab; z-index: 10;
            transition: transform 0.1s; border: 1px solid rgba(255,255,255,0.2);
        }
        .cage:active { cursor: grabbing; transform: scale(1.1); z-index: 100; }
        .cage.dragging { opacity: 0.5; }
        
        .cage.breeding { background: var(--breeding-color); }
        .cage.mating { background: var(--mating-color); }

        .strain-code { font-size: 28px; font-weight: 700; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .sub-id { font-size: 13px; font-weight: 500; opacity: 0.9; margin-top: 2px; }

        /* --- 4. 하단 임시 보관소 (Dock) --- */
        .dock-wrapper { padding: 20px 40px; background: rgba(0,0,0,0.4); border-top: 1px solid var(--glass-border); }
        .dock {
            display: flex; gap: 12px; height: 90px; align-items: center; overflow-x: auto;
            padding: 10px; background: var(--glass-bg); border-radius: 24px; border: 1px solid var(--glass-border);
        }
        .dock .cage { position: relative; width: 75px; height: 75px; flex-shrink: 0; }
        .dock-title { font-size: 14px; color: var(--text-sub); margin-bottom: 10px; }

        /* --- 5. 입력 팝업 (Modal) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 1000;
            display: none; justify-content: center; align-items: center;
        }
        .modal {
            background: rgba(30, 30, 35, 0.9); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px; width: 400px; padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); color: white;
        }
        .modal h2 { margin-top: 0; margin-bottom: 20px; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 5px; }
        .form-control {
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.2); color: white; font-size: 14px; box-sizing: border-box;
        }
        .form-row { display: flex; gap: 10px; }
        .modal-btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
        .btn { padding: 10px 15px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; color: white; }
        .btn-cancel { background: rgba(255,255,255,0.1); }
        .btn-save { background: #0A84FF; }
        .btn-delete { background: #FF375F; margin-right: auto; }
    </style>
</head>
<body>

<header>
    <h1>Smart Rack OS</h1>
    <button class="sync-btn" onclick="syncWithGoogle()">구글 시트 동기화</button>
</header>

<div class="rack-container" id="rack-container">
    </div>

<div class="dock-wrapper">
    <div class="dock-title">임시 보관소 (Overflow Dock) - 랙에서 넘친 케이지가 이곳으로 이동합니다.</div>
    <div class="dock" id="dock" ondragover="event.preventDefault()" ondrop="handleDropToDock(event)"></div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">케이지 정보</h2>
        <input type="hidden" id="m-id">
        <input type="hidden" id="m-rack">
        <input type="hidden" id="m-cell">
        
        <div class="form-group">
            <label>용도 (Type)</label>
            <select id="m-type" class="form-control">
                <option value="breeding">Breeding</option>
                <option value="mating">Mating</option>
            </select>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex:1;">
                <label>표시 알파벳 (Strain)</label>
                <input type="text" id="m-code" class="form-control" placeholder="예: A, C, W">
            </div>
            <div class="form-group" style="flex:1;">
                <label>서브 번호 (ID/Heads)</label>
                <input type="text" id="m-sub" class="form-control" placeholder="예: 53, 5마리">
            </div>
        </div>
        <div class="form-group">
            <label>특이사항 (Notes)</label>
            <textarea id="m-notes" class="form-control" rows="3"></textarea>
        </div>
        
        <div class="modal-btns">
            <button class="btn btn-delete" id="btn-delete" onclick="deleteCage()">삭제</button>
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-save" onclick="saveCage()">저장</button>
        </div>
    </div>
</div>

<script>
    // --- 0. 설정 및 상태 ---
    const API_URL = "https://script.google.com/macros/s/AKfycbzuWMIb2sHbZRkp6mQ1eNwiTRo6CqI-ZFeHHGaIJb5xiiciEQK3dWRXNV6tLn4W6Zlu/exec"; 
    const RACK_CONFIG = { 'A': 35, 'B': 35, 'C': 35, 'D': 21, 'E': 21 }; // 5x7=35, 3x7=21
    
    // 테스트용 임시 데이터 (나중에 구글시트에서 불러옴)
    let cages = [
        { id: 'c1', rackId: 'A', cellIdx: 0, type: 'breeding', code: 'A', subId: 'WT', notes: '' },
        { id: 'c2', rackId: 'A', cellIdx: 2, type: 'mating', code: 'A', subId: '53', notes: '' },
        { id: 'c3', rackId: 'B', cellIdx: 0, type: 'breeding', code: 'C', subId: '12', notes: '' }
    ];

    let draggedCageId = null;

    // --- 1. UI 렌더링 (그리드 및 케이지) ---
    function initUI() {
        const container = document.getElementById('rack-container');
        container.innerHTML = '';

        // 랙 뼈대 만들기
        for (const [rackName, capacity] of Object.entries(RACK_CONFIG)) {
            const panel = document.createElement('div');
            panel.className = 'glass-panel';
            panel.innerHTML = `<div class="rack-title">Rack ${rackName}</div>`;
            
            const grid = document.createElement('div');
            grid.className = 'grid-7';
            
            // 빈 슬롯 만들기
            for (let i = 0; i < capacity; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.rack = rackName;
                slot.dataset.idx = i;
                
                // 클릭 시 신규 케이지 팝업
                slot.onclick = () => openModal(null, rackName, i);
                
                // 드래그 앤 드롭 이벤트
                slot.ondragover = e => { e.preventDefault(); slot.classList.add('drag-over'); };
                slot.ondragleave = () => slot.classList.remove('drag-over');
                slot.ondrop = e => handleDrop(e, rackName, i);
                
                grid.appendChild(slot);
            }
            panel.appendChild(grid);
            container.appendChild(panel);
        }
        renderCages();
    }

    function renderCages() {
        // 기존 렌더링된 쥐들 청소
        document.querySelectorAll('.cage').forEach(el => el.remove());
        const dock = document.getElementById('dock');

        cages.forEach(cage => {
            const el = document.createElement('div');
            el.className = `cage ${cage.type}`;
            el.draggable = true;
            el.innerHTML = `<span class="strain-code">${cage.code}</span><span class="sub-id">${cage.subId}</span>`;
            
            // 드래그 이벤트 (잔상 버그 해결)
            el.ondragstart = (e) => {
                draggedCageId = cage.id;
                e.dataTransfer.effectAllowed = "move";
                setTimeout(() => el.classList.add('dragging'), 0); 
            };
            el.ondragend = () => { el.classList.remove('dragging'); draggedCageId = null; };
            
            // 클릭 시 수정 팝업 (이벤트 버블링 방지)
            el.onclick = (e) => { e.stopPropagation(); openModal(cage.id, cage.rackId, cage.cellIdx); };

            // 위치에 맞게 삽입
            if (cage.rackId === 'DOCK' || cage.cellIdx === null) {
                dock.appendChild(el);
            } else {
                const targetSlot = document.querySelector(`.slot[data-rack="${cage.rackId}"][data-idx="${cage.cellIdx}"]`);
                if(targetSlot) targetSlot.appendChild(el);
            }
        });
    }

    // --- 2. 드래그 앤 드롭 핵심 (밀어내기 로직 완벽 적용) ---
    function handleDrop(e, targetRack, targetIdx) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        if (!draggedCageId) return;

        const draggedCage = cages.find(c => c.id === draggedCageId);
        if (draggedCage.rackId === targetRack && draggedCage.cellIdx === targetIdx) return; // 제자리

        // 도착지에 쥐가 있으면 밀어내기 (Shift Right)
        const occupant = cages.find(c => c.rackId === targetRack && c.cellIdx === targetIdx && c.id !== draggedCageId);
        
        if (occupant) {
            cages.forEach(c => {
                // 도착지 랙에 있고, 타겟 번호보다 뒤에 있는 쥐들을 모두 한 칸씩 민다.
                if (c.rackId === targetRack && c.id !== draggedCageId && c.cellIdx >= targetIdx) {
                    c.cellIdx += 1;
                    // 랙 정원(capacity)을 초과하면 임시 보관소(DOCK)로 쫓겨남
                    if (c.cellIdx >= RACK_CONFIG[targetRack]) {
                        c.rackId = 'DOCK';
                        c.cellIdx = null;
                    }
                }
            });
        }

        // 이동한 쥐 안착
        draggedCage.rackId = targetRack;
        draggedCage.cellIdx = targetIdx;
        
        renderCages();
        // syncWithGoogle(); // 드롭할 때마다 자동 저장하려면 주석 해제
    }

    // 임시 보관소로 바로 드롭
    function handleDropToDock(e) {
        e.preventDefault();
        if (!draggedCageId) return;
        const draggedCage = cages.find(c => c.id === draggedCageId);
        draggedCage.rackId = 'DOCK';
        draggedCage.cellIdx = null;
        renderCages();
    }

    // --- 3. 입력 모달 (수정/생성) ---
    const modal = document.getElementById('modal');

    function openModal(cageId, rackId, cellIdx) {
        document.getElementById('m-rack').value = rackId;
        document.getElementById('m-cell').value = cellIdx;

        if (cageId) {
            // 기존 케이지 수정
            const c = cages.find(x => x.id === cageId);
            document.getElementById('modal-title').innerText = "케이지 정보 수정";
            document.getElementById('m-id').value = c.id;
            document.getElementById('m-type').value = c.type;
            document.getElementById('m-code').value = c.code;
            document.getElementById('m-sub').value = c.subId;
            document.getElementById('m-notes').value = c.notes;
            document.getElementById('btn-delete').style.display = 'block';
        } else {
            // 신규 케이지 생성
            document.getElementById('modal-title').innerText = `신규 등록 (Rack ${rackId}-${cellIdx+1})`;
            document.getElementById('m-id').value = "";
            document.getElementById('m-type').value = "breeding";
            document.getElementById('m-code').value = "";
            document.getElementById('m-sub').value = "";
            document.getElementById('m-notes').value = "";
            document.getElementById('btn-delete').style.display = 'none';
        }
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    function saveCage() {
        const id = document.getElementById('m-id').value;
        const rackId = document.getElementById('m-rack').value;
        const cellIdx = parseInt(document.getElementById('m-cell').value);
        
        const newData = {
            type: document.getElementById('m-type').value,
            code: document.getElementById('m-code').value.toUpperCase(),
            subId: document.getElementById('m-sub').value,
            notes: document.getElementById('m-notes').value
        };

        if (id) { // 업데이트
            const c = cages.find(x => x.id === id);
            Object.assign(c, newData);
        } else { // 신규
            cages.push({
                id: 'c_' + Date.now(), rackId: rackId, cellIdx: cellIdx, ...newData
            });
        }
        closeModal();
        renderCages();
    }

    function deleteCage() {
        const id = document.getElementById('m-id').value;
        cages = cages.filter(c => c.id !== id);
        closeModal();
        renderCages();
    }

    // --- 4. 통신 ---
    function syncWithGoogle() {
        alert("이 기능은 구글 앱스 스크립트 API URL이 연결되면 활성화됩니다!");
        console.log("Current Data:", cages);
    }

    // 앱 시작!
    initUI();
</script>

</body>
</html>
