<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Rack OS - Ultimate v4.0</title>
    <style>
        /* --- 1. Apple Premium Dark Glass Theme --- */
        :root {
            --breeding-bg: linear-gradient(135deg, #0A84FF, #0055B3);
            --mating-bg: linear-gradient(135deg, #FF375F, #B30027);
            --glass-panel: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --slot-bg: rgba(255, 255, 255, 0.02);
            --slot-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-sub: #8e8e93;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: radial-gradient(circle at 50% 30%, #1e1e38, #000000 80%);
            color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        header {
            padding: 15px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--glass-border); background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(40px);
        }
        header h1 { margin: 0; font-size: 24px; font-weight: 700; background: linear-gradient(90deg, #fff, #a1a1a6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .top-right { display: flex; align-items: center; gap: 20px; }
        .progress-container { width: 200px; background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #34c759, #0a84ff); width: 0%; transition: width 0.3s; }
        .progress-text { font-size: 13px; color: var(--text-sub); font-weight: 600; }
        .match-btn { background: rgba(255,255,255,0.08); border: 1px solid var(--glass-border); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .match-btn:hover { background: rgba(255,255,255,0.15); }

        /* --- 2. 메인 워크스페이스 (2컬럼 레이아웃) --- */
        .workspace { flex: 1; display: flex; overflow: hidden; }

        /* 왼쪽: 동물실 배치 도면 내비게이터 */
        .map-nav {
            width: 280px; border-right: 1px solid var(--glass-border); padding: 30px 20px;
            display: flex; flex-direction: column; gap: 20px; background: rgba(0,0,0,0.2);
        }
        .map-title { font-size: 14px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        /* 미니 랙 도면 (Dropzone 역할 통합) */
        .mini-rack-btn {
            background: var(--glass-panel); border: 1px solid var(--glass-border); border-radius: 16px;
            padding: 15px; text-align: left; cursor: pointer; transition: all 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }
        .mini-rack-btn.active { border-color: #0A84FF; background: rgba(10, 132, 255, 0.1); box-shadow: 0 0 15px rgba(10,132,255,0.2); }
        .mini-rack-btn h3 { margin: 0 0 5px 0; font-size: 16px; font-weight: 600; }
        .mini-rack-btn p { margin: 0; font-size: 12px; color: var(--text-sub); }
        .mini-rack-btn.drag-over { background: rgba(52, 199, 89, 0.15); border-color: #34c759; transform: scale(1.03); }

        /* 오른쪽: 현재 선택된 랙의 메인 보드 */
        .board-pane { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; overflow: auto; }
        .board-header { margin-bottom: 25px; }
        .board-title { font-size: 26px; font-weight: 700; margin: 0; }
        .board-desc { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        .grid-container {
            background: var(--glass-panel); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); border-radius: 32px; padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4); position: relative;
        }
        .grid-7 { display: grid; grid-template-columns: repeat(7, 92px); gap: 14px; position: relative; }

        /* --- 3. 정밀 슬롯 및 하이퍼 스무스 가상 케이지 --- */
        .slot {
            width: 92px; height: 92px; border-radius: 24px; background: var(--slot-bg);
            border: 1px dashed var(--slot-border); position: relative;
            display: flex; align-items: center; justify-content: center; box-sizing: border-box;
        }
        .slot::before { content: attr(data-label); font-size: 11px; color: rgba(255,255,255,0.12); font-weight: 600; }
        
        /* 임시 가상 확장 슬롯 (유령 슬롯) */
        .slot.ghost-slot { border-color: rgba(255, 55, 95, 0.4); background: rgba(255, 55, 95, 0.03); animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        /* 하이퍼 모션 그래픽 케이지 객체 */
        .cage {
            width: 92px; height: 92px; border-radius: 24px; position: absolute;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.22); box-sizing: border-box;
            cursor: grab; touch-action: none;
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.25s;
            z-index: 10;
        }
        .cage.breeding { background: var(--breeding-bg); }
        .cage.mating { background: var(--mating-bg); }
        
        /* 드래그 기동 시 이펙트 (실시간 물리 팝업) */
        .cage.floating {
            cursor: grabbing; z-index: 1000 !important;
            transform: scale(1.12) translateY(-5px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            border-color: rgba(255,255,255,0.4);
            pointer-events: none; /* 마우스 이벤트 투과 */
            transition: transform 0.05s linear, box-shadow 0.1s; /* 드래그 중엔 즉각 반응 */
        }

        .strain-code { font-size: 32px; font-weight: 700; line-height: 1; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .sub-id { font-size: 13px; font-weight: 600; opacity: 0.9; margin-top: 4px; background: rgba(0,0,0,0.18); padding: 1px 7px; border-radius: 8px; }

        /* --- 4. 오버레이 패널들 (매칭표 & 모달) --- */
        .side-panel {
            position: fixed; top: 0; right: -350px; width: 320px; height: 100vh;
            background: rgba(20, 20, 25, 0.85); backdrop-filter: blur(30px); border-left: 1px solid var(--glass-border);
            z-index: 900; padding: 40px 25px; box-shadow: -20px 0 40px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .side-panel.open { right: 0; }
        .side-panel h2 { font-size: 22px; margin-top: 0; margin-bottom: 25px; }
        
        .matching-table { width: 100%; border-collapse: collapse; }
        .matching-table th, .matching-table td { text-align: left; padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .matching-table th { color: var(--text-sub); font-size: 13px; }
        .badge { padding: 3px 8px; border-radius: 6px; font-weight: bold; background: #0A84FF; font-size: 13px; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        .modal {
            background: rgba(25, 25, 30, 0.9); border: 1px solid var(--glass-border); border-radius: 28px;
            width: 400px; padding: 35px; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
        }
        .modal h2 { margin-top: 0; margin-bottom: 25px; font-size: 22px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-sub); margin-bottom: 6px; font-weight: 600; }
        .form-control {
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3); color: white; font-size: 15px; box-sizing: border-box;
        }
        .modal-btns { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; }
        .btn { padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; }
        .btn-save { background: #0A84FF; color: white; }
        .btn-delete { background: #FF375F; color: white; margin-right: auto; }
    </style>
</head>
<body>

<header>
    <h1>Smart Rack OS <span style="font-size:14px; color:#0A84FF; font-weight:bold; vertical-align:middle; margin-left:8px;">v4.0 Pro</span></h1>
    <div class="top-right">
        <div class="progress-text">전체 공간 사용률: <span id="occupancy-label">0%</span></div>
        <div class="progress-container">
            <div class="progress-bar" id="occupancy-bar"></div>
        </div>
        <button class="match-btn" onclick="toggleMatchPanel()">🧬 Strain 매칭표</button>
    </div>
</header>

<div class="workspace">
    <div class="map-nav" id="map-navigator">
        <div class="map-title">동물실 실시간 도면</div>
        </div>

    <div class="board-pane">
        <div class="board-header">
            <h2 class="board-title" id="current-rack-title">Rack A</h2>
            <div class="board-desc" id="current-rack-desc">5행 × 7열 (35칸 정원)</div>
        </div>
        
        <div class="grid-container">
            <div class="grid-7" id="main-grid">
                </div>
        </div>
    </div>
</div>

<div class="side-panel" id="match-panel">
    <h2>🧬 Strain 기호 매칭표</h2>
    <table class="matching-table">
        <thead>
            <tr><th>기호</th><th>실제 Strain 명칭</th></tr>
        </thead>
        <tbody>
            <tr><td><span class="badge" style="background:var(--mating-bg)">A</span></td><td>K18-hACE2 (교배시 A53 형태)</td></tr>
            <tr><td><span class="badge" style="background:var(--breeding-bg)">C</span></td><td>Aim2 (검정/생산용 기호)</td></tr>
            <tr><td><span class="badge">W</span></td><td>Wild Type (WT)</td></tr>
        </tbody>
    </table>
    <p style="font-size:12px; color:var(--text-sub); margin-top:30px; line-height:1.5;">* 추후 구글 시트에 매핑 규칙을 추가하면 실시간으로 연동되어 기호가 변경됩니다.</p>
    <button class="match-btn" style="width:100%; margin-top:20px;" onclick="toggleMatchPanel()">판넬 닫기</button>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <h2 id="modal-title">케이지 편집</h2>
        <input type="hidden" id="m-id">
        <div class="form-group">
            <label>용도구분 (Type)</label>
            <select id="m-type" class="form-control">
                <option value="breeding">Breeding (생산용)</option>
                <option value="mating">Mating (교배용)</option>
            </select>
        </div>
        <div class="form-group">
            <label>표시 기호 (Code)</label>
            <input type="text" id="m-code" class="form-control">
        </div>
        <div class="form-group">
            <label>서브 번호/마리수 (Sub ID)</label>
            <input type="text" id="m-sub" class="form-control">
        </div>
        <div class="form-group">
            <label>특이사항 (Notes)</label>
            <textarea id="m-notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="modal-btns">
            <button class="btn btn-delete" id="btn-delete" onclick="deleteCage()">삭제</button>
            <button class="btn btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn btn-save" onclick="saveCage()">적용</button>
        </div>
    </div>
</div>

<script>
    // --- 0. 코어 데이터 모델 및 하드웨어 사양 ---
    const RACK_CONFIG = { 'A': 35, 'B': 35, 'C': 35, 'D': 21, 'E': 21 };
    let currentRack = 'A';
    
    // 시뮬레이터 구동용 마스터 데이터셋 (Mating 10, Breeding 10)
    let cages = [
        { id: 'm1', rackId: 'A', cellIdx: 0, type: 'mating', code: 'A', subId: '51', notes: '' },
        { id: 'm2', rackId: 'A', cellIdx: 1, type: 'mating', code: 'A', subId: '52', notes: '' },
        { id: 'm3', rackId: 'A', cellIdx: 2, type: 'mating', code: 'A', subId: '53', notes: '' },
        { id: 'm4', rackId: 'A', cellIdx: 3, type: 'mating', code: 'A', subId: '54', notes: '' },
        { id: 'm5', rackId: 'B', cellIdx: 0, type: 'mating', code: 'A', subId: '55', notes: '' },
        { id: 'm6', rackId: 'B', cellIdx: 1, type: 'mating', code: 'A', subId: '56', notes: '' },
        { id: 'm7', rackId: 'C', cellIdx: 5, type: 'mating', code: 'A', subId: '57', notes: '' },
        { id: 'm8', rackId: 'C', cellIdx: 6, type: 'mating', code: 'A', subId: '58', notes: '' },
        { id: 'm9', rackId: 'D', cellIdx: 4, type: 'mating', code: 'A', subId: '59', notes: '' },
        { id: 'm10', rackId: 'E', cellIdx: 4, type: 'mating', code: 'A', subId: '60', notes: '' },
        { id: 'b1', rackId: 'A', cellIdx: 4, type: 'breeding', code: 'C', subId: '5마리', notes: '' },
        { id: 'b2', rackId: 'A', cellIdx: 5, type: 'breeding', code: 'C', subId: 'C10', notes: '' },
        { id: 'b3', rackId: 'A', cellIdx: 6, type: 'breeding', code: 'C', subId: 'C11', notes: '' },
        { id: 'b4', rackId: 'B', cellIdx: 10, type: 'breeding', code: 'C', subId: '3마리', notes: '' },
        { id: 'b5', rackId: 'B', cellIdx: 11, type: 'breeding', code: 'C', subId: '4마리', notes: '' },
        { id: 'b6', rackId: 'C', cellIdx: 0, type: 'breeding', code: 'C', subId: 'C12', notes: '' },
        { id: 'b7', rackId: 'C', cellIdx: 1, type: 'breeding', code: 'C', subId: 'C13', notes: '' },
        { id: 'b8', rackId: 'D', cellIdx: 0, type: 'breeding', code: 'C', subId: '2마리', notes: '' },
        { id: 'b9', rackId: 'D', cellIdx: 1, type: 'breeding', code: 'C', subId: 'C14', notes: '' },
        { id: 'b10', rackId: 'E', cellIdx: 0, type: 'breeding', code: 'C', subId: '5마리', notes: '' }
    ];

    // --- 1. 정밀 포인터 드래그 엔진 (Pointer Tracking Engine) ---
    let dragData = { el: null, id: null, active: false, startX: 0, startY: 0, currentSlotIdx: null };

    function setupDragEngine(cageEl, cageId) {
        cageEl.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            dragData.el = cageEl;
            dragData.id = cageId;
            dragData.active = true;
            
            const rect = cageEl.getBoundingClientRect();
            dragData.offsetX = e.clientX - rect.left;
            dragData.offsetY = e.clientY - rect.top;

            cageEl.classList.add('floating');
            cageEl.style.width = rect.width + 'px';
            cageEl.style.height = rect.height + 'px';
            updateDragPosition(e.clientX, e.clientY);
            
            document.addEventListener('pointermove', onPointerMove);
            document.addEventListener('pointerup', onPointerUp);
        });
    }

    function onPointerMove(e) {
        if (!dragData.active) return;
        updateDragPosition(e.clientX, e.clientY);

        // 왼쪽 미니 도면 내비게이터 위를 지나가는지 검사 (Cross-Rack Drag)
        document.querySelectorAll('.mini-rack-btn').forEach(btn => {
            const r = btn.getBoundingClientRect();
            if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
                btn.classList.add('drag-over');
            } else {
                btn.classList.remove('drag-over');
            }
        });
    }

    function updateDragPosition(x, y) {
        dragData.el.style.left = (x - dragData.offsetX) + 'px';
        dragData.el.style.top = (y - dragData.offsetY) + 'px';
    }

    function onPointerUp(e) {
        if (!dragData.active) return;
        dragData.active = false;
        document.removeEventListener('pointermove', onPointerMove);
        document.removeEventListener('pointerup', onPointerUp);

        dragData.el.classList.remove('floating');
        
        let dropped = false;

        // 1. 왼쪽 랙 도면 리스트 위로 드롭되었는지 확인 (Cross-Rack)
        document.querySelectorAll('.mini-rack-btn').forEach(btn => {
            if (btn.classList.contains('drag-over')) {
                btn.classList.remove('drag-over');
                const targetRackName = btn.dataset.rack;
                moveCageToOtherRack(dragData.id, targetRackName);
                dropped = true;
            }
        });

        // 2. 현재 메인 격자 위로 드롭되었는지 확인 (Smart Shifting)
        if (!dropped) {
            const slots = document.querySelectorAll('#main-grid .slot');
            let closestSlot = null;
            let minDistance = 9999;

            slots.forEach(slot => {
                const r = slot.getBoundingClientRect();
                const d = Math.hypot((r.left + r.width/2) - e.clientX, (r.top + r.height/2) - e.clientY);
                if (d < minDistance && d < 60) { // 60px 이내 유효 정밀 검정
                    minDistance = d;
                    closestSlot = slot;
                }
            });

            if (closestSlot) {
                const targetIdx = parseInt(closestSlot.dataset.idx);
                handleSmartShift(dragData.id, currentRack, targetIdx);
            } else {
                renderMainBoard(); // 허공에 떨어뜨리면 원상복구
            }
        }
    }

    // --- 2. 스마트 밀어내기 알고리즘 (Smart Shifting: 빈칸까지만 밀기) ---
    function handleSmartShift(cageId, targetRack, targetIdx) {
        const targetCage = cages.find(c => c.id === cageId);
        const sourceRack = targetCage.rackId;
        const sourceIdx = targetCage.cellIdx;

        if (sourceRack === targetRack && sourceIdx === targetIdx) { renderMainBoard(); return; }

        // 목표 지점에 선점 쥐가 있는지 검사
        const occupant = cages.find(c => c.rackId === targetRack && c.cellIdx === targetIdx && c.id !== cageId);

        if (occupant) {
            // [스마트 밀어내기 코어] targetIdx부터 탐색하여 '가장 가까운 빈 슬롯'의 인덱스를 찾음
            let maxCapacity = RACK_CONFIG[targetRack];
            let firstEmptyIdx = -1;

            for (let i = targetIdx; i < maxCapacity + 20; i++) { // 유령 슬롯 영역까지 탐색 연장
                const hasCage = cages.some(c => c.rackId === targetRack && c.cellIdx === i && c.id !== cageId);
                if (!hasCage) {
                    firstEmptyIdx = i;
                    break;
                }
            }

            // targetIdx부터 가장 가까운 빈칸(firstEmptyIdx) 직전까지의 케이지들만 정확히 +1 시프트!
            cages.forEach(c => {
                if (c.rackId === targetRack && c.id !== cageId && c.cellIdx >= targetIdx && c.cellIdx < firstEmptyIdx) {
                    c.cellIdx += 1;
                }
            });
        }

        // 안착
        targetCage.rackId = targetRack;
        targetCage.cellIdx = targetIdx;

        renderMainBoard();
        buildMapNavigator(); // 미니 도면 현황판 갱신
    }

    // --- 3. 크로스 랙 이동 제어 (랙 도면에 케이지 드롭 시) ---
    function moveCageToOtherRack(cageId, targetRackName) {
        const targetCage = cages.find(c => c.id === cageId);
        if (targetCage.rackId === targetRackName) { renderMainBoard(); return; }

        // 대상 랙의 '가장 첫 번째 빈 슬롯'을 찾아서 자동 안착
        let targetIdx = 0;
        while (cages.some(c => c.rackId === targetRackName && c.cellIdx === targetIdx)) {
            targetIdx++;
        }

        targetCage.rackId = targetRackName;
        targetCage.cellIdx = targetIdx;

        // 만약 방금 보낸 랙이 현재 보던 랙이라면 화면 전환 효과 연동
        currentRack = targetRackName;
        
        renderMainBoard();
        buildMapNavigator();
    }

    // --- 4. 메인 격자 보드 빌드 및 위치 계산 ---
    function renderMainBoard() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';
        
        document.getElementById('current-rack-title').innerText = `Rack ${currentRack}`;
        const capacity = RACK_CONFIG[currentRack];
        document.getElementById('current-rack-desc').innerText = `${capacity / 7}행 × 7열 (${capacity}칸 정원)`;

        // 랙 안의 최고 인덱스 케이지 확인하여 동적 '유령 슬롯' 개수 판단
        const currentRackCages = cages.filter(c => c.rackId === currentRack);
        const maxCellIdx = currentRackCages.reduce((max, c) => c.cellIdx > max ? c.cellIdx : max, capacity - 1);
        
        // 정원을 넘어서 밀려난 케이지가 있다면 격자망을 임시로 확장 (희미한 유령 슬롯 구현)
        const activeCapacity = maxCellIdx + 1;

        // 1. 베이스 격자망(슬롯) 드로잉
        for (let i = 0; i < activeCapacity; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if (i >= capacity) slot.classList.add('ghost-slot'); // 정원 초과 칸은 유령처리
            
            const rowChar = String.fromCharCode(64 + Math.floor(i / 7) + 1);
            const colNum = (i % 7) + 1;
            slot.setAttribute('data-label', `${rowChar}-${colNum}`);
            slot.dataset.idx = i;
            
            // 빈칸 클릭 시 생성 팝업
            slot.onclick = () => openModal(null, i);
            grid.appendChild(slot);
        }

        // 2. 물리 케이지 객체 생성 및 절대 좌표 바인딩 (이래야 끌어올려질 때 렉 없이 매끄러움)
        currentRackCages.forEach(cage => {
            const targetSlot = grid.children[cage.cellIdx];
            if (!targetSlot) return;

            const el = document.createElement('div');
            el.className = `cage ${cage.type}`;
            el.innerHTML = `<span class="strain-code">${cage.code}</span><span class="sub-id">${cage.subId}</span>`;
            
            // 정보 수정 클릭 (드래그와 클릭 분리 가동)
            el.onclick = (e) => { e.stopPropagation(); openModal(cage.id); };

            // 포인터 트래킹 주입
            setupDragEngine(el, cage.id);

            // 초기 절대 좌표 정렬
            setTimeout(() => {
                el.style.left = targetSlot.offsetLeft + 'px';
                el.style.top = targetSlot.offsetTop + 'px';
            }, 0);

            grid.appendChild(el);
        });

        updateGlobalStats();
    }

    // --- 5. 왼쪽 배치 도면 내비게이터 실시간 빌딩 ---
    function buildMapNavigator() {
        const nav = document.getElementById('map-navigator');
        // 타이틀 제외 하부 제거
        document.querySelectorAll('.mini-rack-btn').forEach(el => el.remove());

        for (const rackName of Object.keys(RACK_CONFIG)) {
            const btn = document.createElement('div');
            btn.className = `mini-rack-btn ${rackName === currentRack ? 'active' : ''}`;
            btn.dataset.rack = rackName;

            const rackCages = cages.filter(c => c.rackId === rackName);
            const matingCount = rackCages.filter(c => c.type === 'mating').length;
            const breedingCount = rackCages.filter(c => c.type === 'breeding').length;

            btn.innerHTML = `
                <h3>Rack ${rackName}</h3>
                <p>Mating: ${matingCount} | Breeding: ${breedingCount} (${rackCages.length}/${RACK_CONFIG[rackName]}칸)</p>
            `;

            // 클릭 시 해당 랙 보드로 변환
            btn.onclick = () => {
                currentRack = rackName;
                buildMapNavigator();
                renderMainBoard();
            };

            nav.appendChild(btn);
        }
    }

    // --- 6. 글로벌 통계 연산 제어 및 모달 시스템 ---
    function updateGlobalStats() {
        const totalSlots = Object.values(RACK_CONFIG).reduce((a, b) => a + b, 0);
        const occupiedSlots = cages.filter(c => c.rackId !== 'DOCK').length;
        const rate = Math.round((occupiedSlots / totalSlots) * 100);

        document.getElementById('occupancy-label').innerText = `${rate}% (${occupiedSlots}/${totalSlots} 칸)`;
        document.getElementById('occupancy-bar').style.width = `${rate}%`;
    }

    const modal = document.getElementById('modal');
    let activeSlotIdxForCreate = null;

    function openModal(cageId, slotIdx = null) {
        if (cageId) {
            const c = cages.find(x => x.id === cageId);
            document.getElementById('modal-title').innerText = "케이지 정보 상세";
            document.getElementById('m-id').value = c.id;
            document.getElementById('m-type').value = c.type;
            document.getElementById('m-code').value = c.code;
            document.getElementById('m-sub').value = c.subId;
            document.getElementById('m-notes').value = c.notes || "";
            document.getElementById('btn-delete').style.display = 'block';
        } else {
            activeSlotIdxForCreate = slotIdx;
            document.getElementById('modal-title').innerText = `신규 등록 (Rack ${currentRack})`;
            document.getElementById('m-id').value = "";
            document.getElementById('m-type').value = "breeding";
            document.getElementById('m-code').value = "";
            document.getElementById('m-sub').value = "";
            document.getElementById('m-notes').value = "";
            document.getElementById('btn-delete').style.display = 'none';
        }
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    function saveCage() {
        const id = document.getElementById('m-id').value;
        const info = {
            type: document.getElementById('m-type').value,
            code: document.getElementById('m-code').value.toUpperCase(),
            subId: document.getElementById('m-sub').value,
            notes: document.getElementById('m-notes').value
        };

        if (id) {
            const c = cages.find(x => x.id === id);
            Object.assign(c, info);
        } else {
            cages.push({
                id: 'c_' + Date.now(), rackId: currentRack, cellIdx: activeSlotIdxForCreate, ...info
            });
        }
        closeModal();
        renderMainBoard();
        buildMapNavigator();
    }

    function deleteCage() {
        const id = document.getElementById('m-id').value;
        cages = cages.filter(c => c.id !== id);
        closeModal();
        renderMainBoard();
        buildMapNavigator();
    }

    function toggleMatchPanel() {
        document.getElementById('match-panel').classList.toggle('open');
    }

    // 초기 시스템 부팅 트리거
    buildMapNavigator();
    renderMainBoard();
</script>

</body>
